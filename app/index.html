<!doctype html>

    {
      "imports": {

  <script>
    tailwind.config = {

        extend: {
          colors: {
            pine: {

              900: "#162222",

  <style>

      padding-right: max(1rem, env(safe-area-inset-right));

</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useCallback, useEffect, useMemo, useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import {
      ChakraProvider,
      Box,
      Button,
      Flex,
      Grid,
      GridItem,
      HStack,
      Text,
      VStack,
      extendTheme
    } from "https://esm.sh/@chakra-ui/react@2.10.9?external=react,react-dom&deps=react@18.3.1,react-dom@18.3.1";

    const STORAGE_KEYS = {
      voice: "breathwork.voice",
      muted: "breathwork.muted",
      haptics: "breathwork.haptics"
    };

    const PHASES = [
      { key: "inhale", label: "Inhale", required: true },
      { key: "hold", label: "Hold", required: false },
      { key: "exhale", label: "Exhale", required: true },
      { key: "hold", label: "Hold", required: false }
    ];

    const NUMBER_CLIPS = [
      "zero",
      "one",
      "two",
      "three",
      "four",
      "five",
      "six",
      "seven",
      "eight",
      "nine",
      "ten",
      "eleven",
      "twelve",
      "thirteen",
      "fourteen",
      "fifteen",
      "sixteen",
      "seventeen",
      "eighteen",
      "nineteen",
      "twenty",
      "twenty-one",
      "twenty-two",
      "twenty-three",
      "twenty-four",
      "twenty-five",
      "twenty-six",
      "twenty-seven",
      "twenty-eight",
      "twenty-nine",
      "thirty"
    ];

    const CLIPS = {
      inhale: "inhale.mp3",
      hold: "hold.mp3",
      exhale: "exhale.mp3",
      ...Object.fromEntries(NUMBER_CLIPS.slice(1).map((name, index) => [String(index + 1), `${name}.mp3`]))
    };

    const PRESETS = [
      {
        name: "Box breathing",
        description: "Build steady focus with equal inhale, hold, exhale, and hold.",
        times: [4, 4, 4, 4]
      },
      {
        name: "4-7-8",
        description: "Downshift toward rest with a long hold and longer exhale.",
        times: [4, 7, 8, 0]
      },
      {
        name: "Coherent breathing",
        description: "Support calm regulation with a smooth five-second rhythm.",
        times: [5, 0, 5, 0]
      },
      {
        name: "Relaxing breath",
        description: "Release tension with a soft inhale and extended exhale.",
        times: [4, 0, 6, 0]
      },
      {
        name: "Triangle breathing",
        description: "Create a clear three-part rhythm without a final hold.",
        times: [4, 4, 4, 0]
      },
      {
        name: "Energizing breath",
        description: "Use a shorter, active rhythm for alertness and momentum.",
        times: [3, 0, 3, 0]
      }
    ];

    const VOICES = {
      velvet: {
        name: "Velvet Guide",
        tone: "deep calm, grounding",
        feel: "like being wrapped in a soft blanket at dusk",
        best: "sleep, anxiety relief, long exhale work, theta states"
      },
      heart: {
        name: "Heart Companion",
        tone: "warm, human, gently uplifting",
        feel: "someone kind sitting next to you, breathing with you",
        best: "daily practice, emotional regulation, consistency"
      },
      light: {
        name: "Light Energizer",
        tone: "bright, alive, subtle joy",
        feel: "morning sunlight through a window",
        best: "energizing breathwork, Wim Hof style, activation"
      }
    };

    const chakraTheme = extendTheme({
      styles: {
        global: {
          body: {
            bg: "transparent",
            color: "pine.100"
          }
        }
      },
      colors: {
        pine: {
          950: "#101a1a",
          900: "#162222",
          800: "#1f2f2f",
          700: "#2a3c3b",
          600: "#35504d",
          500: "#4b6f69",
          300: "#9fd1c4",
          100: "#e8f4f1"
        }
      },
      components: {
        Button: {
          baseStyle: {
            borderRadius: "999px",
            fontWeight: 700,
            minH: "44px"
          }
        }
      }
    });

    const clampTiming = value => {
      const number = Number.parseInt(String(value), 10);
      if (!Number.isFinite(number)) return 0;
      return Math.max(0, Math.min(30, number));
    };

    const patternText = times => times.join("-");

    const firstPlayablePhase = times => {
      const index = times.findIndex(seconds => seconds > 0);
      return index >= 0 ? index : 0;
    };

    const nextPlayablePhase = (times, currentPhase) => {
      for (let offset = 1; offset <= PHASES.length; offset += 1) {
        const nextPhase = (currentPhase + offset) % PHASES.length;
        if (times[nextPhase] > 0) {
          return {
            phaseIndex: nextPhase,
            completedCycle: nextPhase <= currentPhase
          };
        }
      }

      return {
        phaseIndex: firstPlayablePhase(times),
        completedCycle: true
      };
    };

    const formatDuration = seconds => {
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;
    };

    function App() {
      const [pattern, setPattern] = useState(PRESETS[0]);
      const [selectedVoice, setSelectedVoice] = useState(() => localStorage.getItem(STORAGE_KEYS.voice) || "velvet");
      const [muted, setMuted] = useState(() => localStorage.getItem(STORAGE_KEYS.muted) === "true");
      const [hapticsEnabled, setHapticsEnabled] = useState(() => localStorage.getItem(STORAGE_KEYS.haptics) !== "false");
      const [activePanel, setActivePanel] = useState(null);
      const [customOpen, setCustomOpen] = useState(false);
      const [customTimes, setCustomTimes] = useState([4, 4, 4, 0]);
      const [customErrors, setCustomErrors] = useState({ inhale: false, exhale: false });
      const [running, setRunning] = useState(false);
      const [phaseIndex, setPhaseIndex] = useState(firstPlayablePhase(PRESETS[0].times));
      const [remaining, setRemaining] = useState(PRESETS[0].times[firstPlayablePhase(PRESETS[0].times)]);
      const [duration, setDuration] = useState(0);
      const [completedBreaths, setCompletedBreaths] = useState(0);
      const audioRef = useRef({});
      const tickRef = useRef(null);
      const preloadTokenRef = useRef("");

      const selectedPatternText = useMemo(() => patternText(pattern.times), [pattern]);

      const closePanels = useCallback(() => setActivePanel(null), []);

      const vibrate = useCallback(durationMs => {
        if (!hapticsEnabled || !navigator.vibrate) return;
        navigator.vibrate(durationMs);
      }, [hapticsEnabled]);

      const playCue = useCallback((cue, token = preloadTokenRef.current) => {
        if (muted) return;
        const key = String(cue).toLowerCase();
        const file = CLIPS[key];
        if (!file) return;

        try {
          const audio = audioRef.current[key] || new Audio(`./audio/${selectedVoice}/${file}?v=${token}`);
          audio.currentTime = 0;
          audio.play().catch(() => {});
        } catch (_) {
          // Audio playback can be blocked until a user gesture; the timer should continue.
        }
      }, [muted, selectedVoice]);

      const resetSession = useCallback((nextPattern = pattern) => {
        const startPhase = firstPlayablePhase(nextPattern.times);
        setRunning(false);
        setPhaseIndex(startPhase);
        setRemaining(nextPattern.times[startPhase]);
        setDuration(0);
        setCompletedBreaths(0);
      }, [pattern]);

      const applyPattern = useCallback(nextPattern => {
        setPattern(nextPattern);
        setCustomTimes(nextPattern.times);
        setCustomErrors({ inhale: false, exhale: false });
        resetSession(nextPattern);
        closePanels();
      }, [closePanels, resetSession]);

      const startSession = () => {
        const startPhase = firstPlayablePhase(pattern.times);
        setActivePanel(null);
        setCustomOpen(false);
        setDuration(0);
        setCompletedBreaths(0);
        setPhaseIndex(startPhase);
        setRemaining(pattern.times[startPhase]);
        setRunning(true);
        playCue(PHASES[startPhase].key);
        vibrate(160);
      };

      const stopSession = () => {
        resetSession();
      };

      const updateCustomTime = (index, value) => {
        setCustomTimes(current => current.map((seconds, currentIndex) => currentIndex === index ? clampTiming(value) : seconds));
        if (index === 0) setCustomErrors(current => ({ ...current, inhale: false }));
        if (index === 2) setCustomErrors(current => ({ ...current, exhale: false }));
      };

      const applyCustomPattern = () => {
        const nextTimes = customTimes.map(clampTiming);
        const nextErrors = {
          inhale: nextTimes[0] < 1,
          exhale: nextTimes[2] < 1
        };
        setCustomErrors(nextErrors);

        if (nextErrors.inhale || nextErrors.exhale) return;

        applyPattern({
          name: "Custom breathing pattern",
          description: "Your custom rhythm.",
          times: nextTimes
        });
      };

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.voice, selectedVoice);
        const token = String(Date.now());
        preloadTokenRef.current = token;
        const loaded = {};

        Object.entries(CLIPS).forEach(([key, file]) => {
          const audio = new Audio(`./audio/${selectedVoice}/${file}?v=${token}`);
          audio.preload = "auto";
          audio.load();
          loaded[key] = audio;
        });

        audioRef.current = loaded;
      }, [selectedVoice]);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.muted, String(muted));
      }, [muted]);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.haptics, String(hapticsEnabled));
      }, [hapticsEnabled]);

      useEffect(() => {
        if (!running) {
          window.clearInterval(tickRef.current);
          tickRef.current = null;
          return undefined;
        }

        tickRef.current = window.setInterval(() => {
          setDuration(seconds => seconds + 1);
          setRemaining(seconds => seconds - 1);
        }, 1000);

        return () => {
          window.clearInterval(tickRef.current);
          tickRef.current = null;
        };
      }, [running]);

      useEffect(() => {
        if (!running) return;

        if (remaining > 0) {
          if (remaining !== pattern.times[phaseIndex]) {
            playCue(remaining);
            vibrate(45);
          }
          return;
        }

        const next = nextPlayablePhase(pattern.times, phaseIndex);
        setPhaseIndex(next.phaseIndex);
        setRemaining(pattern.times[next.phaseIndex]);
        if (next.completedCycle) {
          setCompletedBreaths(count => count + 1);
        }
        playCue(PHASES[next.phaseIndex].key);
        vibrate(180);
      }, [phaseIndex, pattern.times, playCue, remaining, running, vibrate]);

      return React.createElement(Box, {
        className: running ? "h-[100dvh] overflow-hidden bg-pine-900 text-pine-100" : "min-h-[100dvh] bg-pine-900 text-pine-100"
      },
        React.createElement(Box, {
          className: running ? "mx-auto flex h-full max-w-4xl flex-col screen-safe py-3" : "mx-auto flex min-h-[100dvh] max-w-4xl flex-col screen-safe py-3"
        },
          React.createElement(Header, {
            hapticsEnabled,
            muted,
            onMenu: () => setActivePanel("menu"),
            onToggleHaptics: () => setHapticsEnabled(current => !current),
            onToggleMute: () => setMuted(current => !current),
            running
          }),

          React.createElement(BreathingCoach, {
            completedBreaths,
            duration,
            onStart: startSession,
            onStop: stopSession,
            pattern,
            patternText: selectedPatternText,
            phaseLabel: PHASES[phaseIndex].label,
            remaining,
            running
          }),

          !running && React.createElement(VStack, { align: "stretch", spacing: 3, mt: 4, pb: 6 },
            React.createElement(Button, {
              className: "focus-ring",
              colorScheme: "teal",
              h: "52px",
              onClick: () => setActivePanel("patterns")
            }, "Breathing pattern library"),
            React.createElement(CustomPattern, {
              customErrors,
              customOpen,
              customTimes,
              onApply: applyCustomPattern,
              onToggle: () => setCustomOpen(current => !current),
              onUpdate: updateCustomTime
            })
          )
        ),

        React.createElement(FullscreenPanel, {
          isOpen: activePanel === "menu",
          onClose: closePanels,
          title: "Menu"
        },
          React.createElement(VStack, { align: "stretch", spacing: 4 },
            React.createElement(MenuCard, {
              description: "Choose a predefined breathing pattern according to how you want to feel.",
              onClick: () => setActivePanel("patterns"),
              title: "Breathing patterns"
            }),
            React.createElement(MenuCard, {
              description: "Select a voice for the spoken guidance.",
              onClick: () => setActivePanel("voices"),
              title: "Choose a voice"
            })
          )
        ),

        React.createElement(FullscreenPanel, {
          isOpen: activePanel === "patterns",
          onClose: closePanels,
          title: "Breathing patterns"
        },
          React.createElement(VStack, { align: "stretch", spacing: 3 },
            PRESETS.map(preset => React.createElement(ChoiceCard, {
              key: preset.name,
              description: preset.description,
              meta: patternText(preset.times),
              onClick: () => applyPattern(preset),
              selected: preset.name === pattern.name && patternText(preset.times) === selectedPatternText,
              title: preset.name
            }))
          )
        ),

        React.createElement(FullscreenPanel, {
          isOpen: activePanel === "voices",
          onClose: closePanels,
          title: "Choose a voice"
        },
          React.createElement(VStack, { align: "stretch", spacing: 3 },
            Object.entries(VOICES).map(([key, voice]) => React.createElement(ChoiceCard, {
              key,
              description: `Feel: ${voice.feel}`,
              meta: `Best for: ${voice.best}`,
              onClick: () => {
                setSelectedVoice(key);
                closePanels();
              },
              selected: selectedVoice === key,
              title: `${voice.name} (${voice.tone})`
            }))
          )
        )
      );
    }

    function Header({ hapticsEnabled, muted, onMenu, onToggleHaptics, onToggleMute, running }) {
      return React.createElement(Flex, {
        align: "center",
        className: running ? "shrink-0 pb-3" : "sticky top-0 z-20 bg-pine-900/95 pb-3 pt-1 backdrop-blur",
        justify: "space-between"
      },
        React.createElement(Button, {
          "aria-label": "Open menu",
          className: "focus-ring",
          minW: "44px",
          onClick: onMenu,
          variant: "solid"
        }, "☰"),
        React.createElement(Text, {
          className: "select-none",
          fontSize: "lg",
          fontWeight: 800,
          letterSpacing: "0.03em"
        }, "Breathwork"),
        React.createElement(HStack, { spacing: 2 },
          React.createElement(Button, {
            "aria-label": muted ? "Unmute voice guidance" : "Mute voice guidance",
            className: "focus-ring",
            minW: "44px",
            onClick: onToggleMute
          }, muted ? "🔇" : "🔊"),
          React.createElement(Button, {
            "aria-label": hapticsEnabled ? "Disable haptic feedback" : "Enable haptic feedback",
            className: "focus-ring",
            minW: "44px",
            onClick: onToggleHaptics
          }, hapticsEnabled ? "📳" : "📴")
        )
      );
    }

    function BreathingCoach({ completedBreaths, duration, onStart, onStop, pattern, patternText, phaseLabel, remaining, running }) {
      if (running) {
        return React.createElement(Box, {
          "aria-live": "polite",
          className: "grid min-h-0 flex-1 rounded-[2rem] bg-pine-800 shadow-breath",
          style: { gridTemplateRows: "72px minmax(0, 1fr) 112px" }
        },
          React.createElement(Flex, {
            align: "center",
            className: "px-4 text-pine-300",
            justify: "space-between"
          },
            React.createElement(Box, { fontVariantNumeric: "tabular-nums" },
              React.createElement(Text, { fontSize: "sm" }, "Duration"),
              React.createElement(Text, { color: "pine.100", fontSize: "xl", fontWeight: 800 }, formatDuration(duration))
            ),
            React.createElement(Box, { fontVariantNumeric: "tabular-nums", textAlign: "right" },
              React.createElement(Text, { fontSize: "sm" }, "Breaths"),
              React.createElement(Text, { color: "pine.100", fontSize: "xl", fontWeight: 800 }, completedBreaths)
            )
          ),
          React.createElement(VStack, {
            align: "center",
            className: "min-h-0 justify-center px-4 pb-4 text-center",
            spacing: 2
          },
            React.createElement(Text, {
              color: "pine.300",
              fontSize: ["xl", "2xl"],
              fontWeight: 800,
              letterSpacing: "0.12em",
              textTransform: "uppercase"
            }, phaseLabel),
            React.createElement(Text, {
              className: "text-[clamp(6rem,31vw,13rem)]",
              fontWeight: 900,
              lineHeight: 0.85,
              fontVariantNumeric: "tabular-nums"
            }, remaining),
            React.createElement(Text, { color: "pine.300", fontSize: ["lg", "xl"] }, patternText)
          ),
          React.createElement(Box, {
            className: "flex min-h-24 items-end px-4 bottom-safe"
          },
            React.createElement(Button, {
              className: "focus-ring",
              colorScheme: "red",
              h: "56px",
              onClick: onStop,
              w: "full"
            }, "Stop")
          )
        );
      }

      return React.createElement(Box, {
        className: "flex min-h-[42vh] flex-1 flex-col items-center justify-center rounded-[2rem] bg-pine-800 p-6 text-center shadow-breath"
      },
        React.createElement(VStack, { spacing: 4 },
          React.createElement(Box, null,
            React.createElement(Text, { fontSize: ["3xl", "4xl"], fontWeight: 900 }, pattern.name),
            React.createElement(Text, { color: "pine.300", fontSize: ["xl", "2xl"], fontWeight: 700, mt: 1 }, patternText)
          ),
          React.createElement(Text, { color: "pine.300" }, `${completedBreaths} breaths completed`),
          React.createElement(Button, {
            className: "focus-ring",
            colorScheme: "teal",
            h: "56px",
            onClick: onStart,
            px: 10
          }, "Start")
        )
      );
    }

    function CustomPattern({ customErrors, customOpen, customTimes, onApply, onToggle, onUpdate }) {
      const fields = [
        { index: 0, label: "Inhale", error: customErrors.inhale },
        { index: 1, label: "Hold after inhale", error: false },
        { index: 2, label: "Exhale", error: customErrors.exhale },
        { index: 3, label: "Hold after exhale", error: false }
      ];

      return React.createElement(Box, {
        className: "rounded-3xl bg-pine-800 p-3"
      },
        React.createElement(Button, {
          "aria-expanded": customOpen,
          className: "focus-ring",
          h: "52px",
          onClick: onToggle,
          w: "full"
        }, "Custom breathing pattern"),
        customOpen && React.createElement(VStack, {
          align: "stretch",
          className: "pt-4",
          spacing: 4
        },
          React.createElement(Text, { fontSize: "lg", fontWeight: 800 }, "Your breathing pattern"),
          React.createElement(Grid, { templateColumns: "repeat(2, minmax(0, 1fr))", gap: 3 },
            fields.map(field => React.createElement(GridItem, { key: field.index },
              React.createElement(Text, { color: "pine.300", fontSize: "sm", mb: 1 }, field.label),
              React.createElement(HStack, { spacing: 1 },
                React.createElement(Button, {
                  "aria-label": `Subtract one second from ${field.label}`,
                  className: "focus-ring",
                  minW: "40px",
                  onClick: () => onUpdate(field.index, customTimes[field.index] - 1),
                  px: 0
                }, "−"),
                React.createElement(Box, {
                  "aria-invalid": field.error,
                  "aria-label": `${field.label} seconds`,
                  as: "input",
                  className: `min-w-0 rounded-xl border bg-pine-950 px-2 py-3 text-center text-pine-100 focus-ring ${field.error ? "border-red-400" : "border-pine-500"}`,
                  inputMode: "numeric",
                  min: 0,
                  onChange: event => onUpdate(field.index, event.target.value),
                  pattern: "[0-9]*",
                  step: 1,
                  type: "number",
                  value: customTimes[field.index],
                  w: "full"
                }),
                React.createElement(Button, {
                  "aria-label": `Add one second to ${field.label}`,
                  className: "focus-ring",
                  minW: "40px",
                  onClick: () => onUpdate(field.index, customTimes[field.index] + 1),
                  px: 0
                }, "+")
              )
            ))
          ),
          (customErrors.inhale || customErrors.exhale) && React.createElement(Text, {
            color: "red.200",
            fontSize: "sm"
          }, "Inhale and exhale must be at least 1 second."),
          React.createElement(Button, {
            className: "focus-ring",
            colorScheme: "teal",
            h: "52px",
            onClick: onApply,
            w: "full"
          }, "Use this custom pattern")
        )
      );
    }

    function FullscreenPanel({ children, isOpen, onClose, title }) {
      if (!isOpen) return null;

      return React.createElement(Box, {
        "aria-modal": "true",
        className: "fixed inset-0 z-50 overflow-y-auto bg-pine-800 text-pine-100",
        role: "dialog"
      },
        React.createElement(Box, { className: "mx-auto min-h-[100dvh] max-w-3xl screen-safe py-4" },
          React.createElement(Flex, {
            align: "center",
            className: "sticky top-0 z-10 bg-pine-800/95 pb-4 backdrop-blur",
            justify: "space-between"
          },
            React.createElement(Box, { w: "44px" }),
            React.createElement(Text, { fontSize: "2xl", fontWeight: 900 }, title),
            React.createElement(Button, {
              "aria-label": `Close ${title}`,
              className: "focus-ring",
              minW: "44px",
              onClick: onClose,
              px: 0
            }, "×")
          ),
          children
        )
      );
