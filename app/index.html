<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1f2a2a" />
  <link rel="manifest" href="manifest.json" />
  <title>Breathwork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
        "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime"
      }
    }
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pine: {
              900: "#162222",
              800: "#1f2f2f",
              700: "#2a3c3b",
              600: "#35504d",
              500: "#4b6f69",
              300: "#8fc5b6"
            }
          },
          boxShadow: {
            breath: "0 18px 45px rgba(0,0,0,.35)"
          }
        }
      }
    };
  </script>
  <style>
    html, body { margin: 0; min-height: 100%; background: #162222; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useMemo, useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import {
      ChakraProvider,
      Box,
      Flex,
      Text,
      Button,
      VStack,
      HStack,
      Grid,
      GridItem,
      Drawer,
      DrawerOverlay,
      DrawerContent,
      DrawerHeader,
      DrawerBody,
      useDisclosure,
      theme as chakraTheme
    } from "https://esm.sh/@chakra-ui/react@2.10.9?external=react,react-dom&deps=react@18.3.1,react-dom@18.3.1";

    const PRESETS = [
      { name: "Box Breathing", description: "Balanced and steady focus.", times: [4, 4, 4, 4] },
      { name: "4-7-8", description: "Longer exhale for relaxation.", times: [4, 7, 8, 0] },
      { name: "Coherent 5-5", description: "Smooth regulation rhythm.", times: [5, 0, 5, 0] },
      { name: "Relaxing 4-6", description: "Gentle tension release.", times: [4, 0, 6, 0] },
      { name: "Triangle", description: "Structured, no end hold.", times: [4, 4, 4, 0] }
    ];

    const VOICES = {
      velvet: {
        label: "Velvet Guide",
        feel: "like being wrapped in a soft blanket at dusk",
        best: "sleep, anxiety relief, long exhale work, theta states"
      },
      heart: {
        label: "Heart Companion",
        feel: "someone kind sitting next to you, breathing with you",
        best: "daily practice, emotional regulation, consistency"
      },
      light: {
        label: "Light Energizer",
        feel: "morning sunlight through a window",
        best: "energizing breathwork, Wim Hof style, activation"
      }
    };

    const CLIPS = {
      inhale: "inhale.mp3", hold: "hold.mp3", exhale: "exhale.mp3",
      1: "one.mp3",2: "two.mp3",3: "three.mp3",4: "four.mp3",5: "five.mp3",6: "six.mp3",7: "seven.mp3",8: "eight.mp3",9: "nine.mp3",10: "ten.mp3",
      11: "eleven.mp3",12: "twelve.mp3",13: "thirteen.mp3",14: "fourteen.mp3",15: "fifteen.mp3",16: "sixteen.mp3",17: "seventeen.mp3",18: "eighteen.mp3",19: "nineteen.mp3",20: "twenty.mp3",
      21: "twenty-one.mp3",22: "twenty-two.mp3",23: "twenty-three.mp3",24: "twenty-four.mp3",25: "twenty-five.mp3",26: "twenty-six.mp3",27: "twenty-seven.mp3",28: "twenty-eight.mp3",29: "twenty-nine.mp3",30: "thirty.mp3"
    };

    const PHASES = ["Inhale", "Hold", "Exhale", "Hold"];

    const normalize = value => {
      const n = Number(value);
      if (!Number.isFinite(n)) return 0;
      return Math.max(0, Math.min(300, Math.round(n)));
    };

    const firstPhaseIndex = times => {
      const idx = times.findIndex(t => t > 0);
      return idx >= 0 ? idx : 0;
    };

    const formatDuration = total => `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;

    function App() {
      const [selectedVoice, setSelectedVoice] = useState(localStorage.getItem("breathwork_voice") || "velvet");
      const [muted, setMuted] = useState(localStorage.getItem("breathwork_muted") === "true");
      const [haptic, setHaptic] = useState(localStorage.getItem("breathwork_haptic") !== "false");
      const [pattern, setPattern] = useState(PRESETS[0]);
      const [customOpen, setCustomOpen] = useState(false);
      const [customTimes, setCustomTimes] = useState([4, 4, 4, 0]);
      const [customErrors, setCustomErrors] = useState({ inhale: false, exhale: false });

      const [running, setRunning] = useState(false);
      const [phaseIndex, setPhaseIndex] = useState(firstPhaseIndex(PRESETS[0].times));
      const [remaining, setRemaining] = useState(PRESETS[0].times[firstPhaseIndex(PRESETS[0].times)]);
      const [sessionSeconds, setSessionSeconds] = useState(0);
      const [completedBreaths, setCompletedBreaths] = useState(0);

      const audioRef = useRef({});
      const intervalRef = useRef(null);

      const menu = useDisclosure();
      const patterns = useDisclosure();
      const voices = useDisclosure();

      useEffect(() => {
        const loaded = {};
        const base = `./audio/${selectedVoice}/`;
        Object.entries(CLIPS).forEach(([k, file]) => {
          const audio = new Audio(base + file);
          audio.preload = "auto";
          loaded[k] = audio;
        });
        audioRef.current = loaded;
        localStorage.setItem("breathwork_voice", selectedVoice);
      }, [selectedVoice]);

      useEffect(() => {
        localStorage.setItem("breathwork_muted", String(muted));
      }, [muted]);

      useEffect(() => {
        localStorage.setItem("breathwork_haptic", String(haptic));
      }, [haptic]);

      useEffect(() => {
        if (!running) {
          if (intervalRef.current) clearInterval(intervalRef.current);
          intervalRef.current = null;
          return;
        }

        intervalRef.current = setInterval(() => {
          setSessionSeconds(s => s + 1);
          setRemaining(r => r - 1);
        }, 1000);

        return () => {
          if (intervalRef.current) clearInterval(intervalRef.current);
          intervalRef.current = null;
        };
      }, [running]);

      useEffect(() => {
        if (!running) return;

        if (remaining > 0) {
          if (!muted) playCue(remaining);
          if (haptic && navigator.vibrate) navigator.vibrate(40);
          return;
        }

        let next = phaseIndex;
        let wraps = 0;
        while (wraps < 4) {
          const candidate = (next + 1) % 4;
          if (candidate === 0 && next !== 0) setCompletedBreaths(b => b + 1);
          next = candidate;
          if (pattern.times[next] > 0) break;
          wraps += 1;
        }

        setPhaseIndex(next);
        setRemaining(pattern.times[next]);
        if (!muted) playCue(PHASES[next].toLowerCase());
        if (haptic && navigator.vibrate) navigator.vibrate(140);
      }, [remaining, running]);

      const patternText = useMemo(() => pattern.times.join("-"), [pattern]);

      const playCue = cue => {
        if (muted) return;
        const key = String(cue).toLowerCase();
        const mapped = (key === "inhale" || key === "exhale" || key === "hold") ? key : String(Number(cue));
        const template = audioRef.current[mapped];
        if (!template) return;
        try {
          const clip = template.cloneNode(true);
          clip.play().catch(() => {});
        } catch (_) {}
      };

      const resetSession = nextPattern => {
        const target = nextPattern || pattern;
        const startIdx = firstPhaseIndex(target.times);
        setRunning(false);
        setPhaseIndex(startIdx);
        setRemaining(target.times[startIdx]);
        setSessionSeconds(0);
        setCompletedBreaths(0);
      };

      const applyPattern = next => {
        setPattern(next);
        setCustomTimes(next.times);
        resetSession(next);
      };

      const applyCustomPattern = () => {
        const next = customTimes.map(normalize);
        const inhaleValid = next[0] >= 1;
        const exhaleValid = next[2] >= 1;
        setCustomErrors({ inhale: !inhaleValid, exhale: !exhaleValid });
        if (!inhaleValid || !exhaleValid) return;
        applyPattern({ name: "Custom pattern", description: "Your custom rhythm", times: next });
      };

      const startSession = () => {
        if (pattern.times[0] < 1 || pattern.times[2] < 1) return;
        setRunning(true);
        if (!muted) playCue(PHASES[phaseIndex].toLowerCase());
      };

      const stopSession = () => {
        resetSession();
      };

      return (
        React.createElement(Box, { className: "min-h-screen bg-pine-900 text-white" },
          React.createElement(Box, { className: "mx-auto max-w-5xl p-3 md:p-4" },
            React.createElement(Flex, { align: "center", justify: "space-between", gap: 2, className: "sticky top-0 z-10 py-1" },
              React.createElement(Button, { "aria-label": "Open menu", onClick: menu.onOpen, minW: "44px", h: "44px", p: 0 }, "☰"),
              React.createElement(Text, { fontWeight: "700", fontSize: "lg", letterSpacing: "0.02em" }, "Breathwork"),
              React.createElement(HStack, { spacing: 2 },
                React.createElement(Button, { "aria-label": "Toggle mute", onClick: () => setMuted(v => !v), minW: "44px", h: "44px", p: 0 }, muted ? "🔇" : "🔊"),
                React.createElement(Button, { "aria-label": "Toggle haptics", onClick: () => setHaptic(v => !v), minW: "44px", h: "44px", p: 0 }, haptic ? "📳" : "📴")
              )
            ),

            React.createElement(Box, { className: running ? "rounded-none" : "rounded-3xl", bg: "pine.700", boxShadow: "breath", p: 5, minH: running ? "calc(100vh - 90px)" : "42vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", position: "relative" },
              running && React.createElement(Flex, { w: "full", justify: "space-between", color: "pine.300", mb: "auto", fontVariantNumeric: "tabular-nums" },
                React.createElement(Box, null,
                  React.createElement(Text, null, formatDuration(sessionSeconds)),
                  React.createElement(Text, null, `${completedBreaths} ${completedBreaths === 1 ? "breath" : "breaths"}`)
                )
              ),

              !running && React.createElement(VStack, { spacing: 3 },
                React.createElement(Text, { fontSize: ["2xl", "3xl"], fontWeight: "700" }, pattern.name),
                React.createElement(Text, { color: "pine.300" }, patternText),
                React.createElement(Text, { color: "pine.300" }, `${completedBreaths} breaths completed`),
                React.createElement(Button, { colorScheme: "teal", onClick: startSession, w: "full" }, "Start")
              ),

              running && React.createElement(VStack, { spacing: 2 },
                React.createElement(Text, { color: "pine.300", textTransform: "uppercase", letterSpacing: "0.08em", fontSize: ["xl", "2xl"] }, PHASES[phaseIndex]),
                React.createElement(Text, { fontSize: ["8rem", "10rem"], lineHeight: "0.9", fontWeight: "800", fontVariantNumeric: "tabular-nums" }, remaining),
                React.createElement(Text, { color: "pine.300" }, patternText)
              ),

              running && React.createElement(Box, { position: "fixed", left: 3, right: 3, bottom: 3 },
                React.createElement(Button, { colorScheme: "red", w: "full", onClick: stopSession }, "Stop")
              )
            ),

            !running && React.createElement(VStack, { spacing: 3, mt: 3 },
              React.createElement(Box, { w: "full", p: 3, bg: "pine.700", rounded: "xl" },
                React.createElement(Button, { w: "full", onClick: patterns.onOpen }, "Breathing pattern library")
              ),
              React.createElement(Box, { w: "full", p: 3, bg: "pine.700", rounded: "xl" },
                React.createElement(Button, { w: "full", onClick: () => setCustomOpen(v => !v) }, "Custom breathing pattern"),
                customOpen && React.createElement(VStack, { spacing: 3, align: "stretch", mt: 3 },
                  React.createElement(Text, { fontWeight: "600" }, "Your breathing pattern"),
                  React.createElement(Grid, { templateColumns: ["1fr", "1fr 1fr"], gap: 3 },
                    [
                      { key: 0, label: "Inhale", err: customErrors.inhale },
                      { key: 1, label: "Hold after inhale", err: false },
                      { key: 2, label: "Exhale", err: customErrors.exhale },
                      { key: 3, label: "Hold after exhale", err: false }
                    ].map(field => React.createElement(GridItem, { key: field.key },
                      React.createElement(Text, { fontSize: "sm", color: "pine.300", mb: 1 }, field.label),
                      React.createElement(HStack, null,
                        React.createElement(Button, { onClick: () => setCustomTimes(t => t.map((n, i) => i === field.key ? normalize(n - 1) : n)) }, "-"),
                        React.createElement(Box, {
                          as: "input",
                          type: "number",
                          min: "0",
                          step: "1",
                          value: customTimes[field.key],
                          onChange: e => {
                            const value = normalize(e.target.value);
                            setCustomTimes(t => t.map((n, i) => i === field.key ? value : n));
                            if (field.key === 0) setCustomErrors(v => ({ ...v, inhale: false }));
                            if (field.key === 2) setCustomErrors(v => ({ ...v, exhale: false }));
                          },
                          className: `w-full rounded-md border px-3 py-2 text-center bg-pine-800 ${field.err ? "border-red-400" : "border-pine-500"}`
                        }),
                        React.createElement(Button, { onClick: () => setCustomTimes(t => t.map((n, i) => i === field.key ? normalize(n + 1) : n)) }, "+")
                      )
                    ))
                  ),
                  React.createElement(Button, { colorScheme: "teal", onClick: applyCustomPattern }, "Use this custom pattern")
                )
              )
            )
          ),

          React.createElement(Drawer, { isOpen: menu.isOpen, placement: "left", onClose: menu.onClose, size: "full" },
            React.createElement(DrawerOverlay),
            React.createElement(DrawerContent, { bg: "pine.800" },
              React.createElement(DrawerHeader, null,
                React.createElement(Flex, { justify: "space-between", align: "center" },
                  React.createElement(Text, null, "Menu"),
                  React.createElement(Button, { "aria-label": "Close menu", onClick: menu.onClose, minW: "44px", h: "44px", p: 0 }, "×")
                )
              ),
              React.createElement(DrawerBody, null,
                React.createElement(VStack, { spacing: 3, align: "stretch" },
                  React.createElement(Button, {
                    onClick: () => { menu.onClose(); patterns.onOpen(); },
                    justifyContent: "start",
                    h: "auto",
                    py: 4,
                    whiteSpace: "normal"
                  }, "Breathing patterns - Choose a predefined breathing pattern according to how you want to feel."),
                  React.createElement(Button, {
                    onClick: () => { menu.onClose(); voices.onOpen(); },
                    justifyContent: "start",
                    h: "auto",
                    py: 4,
                    whiteSpace: "normal"
                  }, "Choose a voice - Select a voice for the spoken guidance.")
                )
              )
            )
          ),

          React.createElement(Drawer, { isOpen: patterns.isOpen, placement: "left", onClose: patterns.onClose, size: "full" },
            React.createElement(DrawerOverlay),
            React.createElement(DrawerContent, { bg: "pine.800" },
              React.createElement(DrawerHeader, null,
                React.createElement(Flex, { justify: "space-between", align: "center" },
                  React.createElement(Text, null, "Breathing patterns"),
                  React.createElement(Button, { "aria-label": "Close patterns", onClick: patterns.onClose, minW: "44px", h: "44px", p: 0 }, "×")
                )
              ),
              React.createElement(DrawerBody, null,
                React.createElement(VStack, { spacing: 3, align: "stretch" },
                  PRESETS.map(p => React.createElement(Button, {
                    key: p.name,
                    h: "auto",
                    py: 4,
                    justifyContent: "start",
                    textAlign: "left",
                    whiteSpace: "normal",
                    onClick: () => { applyPattern(p); patterns.onClose(); }
                  }, `${p.name} - ${p.description} (${p.times.join("-")})`))
                )
              )
            )
          ),

          React.createElement(Drawer, { isOpen: voices.isOpen, placement: "left", onClose: voices.onClose, size: "full" },
            React.createElement(DrawerOverlay),
            React.createElement(DrawerContent, { bg: "pine.800" },
              React.createElement(DrawerHeader, null,
                React.createElement(Flex, { justify: "space-between", align: "center" },
                  React.createElement(Text, null, "Choose a voice"),
                  React.createElement(Button, { "aria-label": "Close voices", onClick: voices.onClose, minW: "44px", h: "44px", p: 0 }, "×")
                )
              ),
              React.createElement(DrawerBody, null,
                React.createElement(VStack, { spacing: 3, align: "stretch" },
                  Object.entries(VOICES).map(([key, v]) => React.createElement(Button, {
                    key,
                    h: "auto",
                    py: 4,
                    justifyContent: "start",
                    textAlign: "left",
                    whiteSpace: "normal",
                    colorScheme: selectedVoice === key ? "teal" : "gray",
                    variant: selectedVoice === key ? "solid" : "outline",
                    onClick: () => {
                      setSelectedVoice(key);
                      voices.onClose();
                    }
                  }, `${v.label} | Feel: ${v.feel} | Best for: ${v.best}`))
                )
              )
            )
          )
        )
      );
    }

    const root = createRoot(document.getElementById("root"));
    root.render(
      React.createElement(ChakraProvider, { theme: chakraTheme }, React.createElement(App))
    );

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
