<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f7f4ef" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <title>Breathwork</title>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1?dev",
        "react-dom": "https://esm.sh/react-dom@18.3.1?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
        "lucide-react": "https://esm.sh/lucide-react@0.468.0?external=react&deps=react@18.3.1"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: light;
      --app-bg: #f7f4ef;
      --app-panel: #fffdfa;
      --app-panel-muted: #eee8df;
      --app-fg: #1f2320;
      --app-muted: #626a64;
      --app-border: #d8d0c4;
      --app-accent: #2f756c;
      --app-accent-strong: #225b54;
      --app-danger: #b3261e;
      --app-danger-bg: #fff0ee;
      --app-focus: #287d73;
      --app-shadow: 0 18px 50px rgba(47, 39, 30, 0.12);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--app-bg);
      color: var(--app-fg);
      overscroll-behavior: none;
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #root {
      min-height: 100vh;
      min-height: 100dvh;
    }

    button,
    input {
      font: inherit;
    }

    .app-safe {
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
    }

    .focus-ring:focus-visible {
      outline: 3px solid var(--app-focus);
      outline-offset: 3px;
    }

    .breath-orb {
      transform: scale(var(--breath-scale));
      transition: transform 900ms ease-in-out, opacity 900ms ease-in-out;
    }

    @media (prefers-reduced-motion: reduce) {
      .breath-orb {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useCallback, useEffect, useMemo, useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import {
      Box,
      Button,
      ChakraProvider,
      Flex,
      Grid,
      HStack,
      IconButton,
      Stack,
      Text,
      VStack,
      createSystem,
      defaultConfig,
      defineConfig
    } from "https://esm.sh/@chakra-ui/react@3.22.0?external=react,react-dom&deps=react@18.3.1,react-dom@18.3.1";
    import {
      Check,
      ChevronDown,
      ChevronUp,
      Menu,
      Minus,
      Plus,
      Volume2,
      VolumeX,
      Waves,
      X,
      Zap,
      ZapOff
    } from "lucide-react";

    const system = createSystem(defaultConfig, defineConfig({
      theme: {
        tokens: {
          colors: {
            cream: { value: "#f7f4ef" },
            surface: { value: "#fffdfa" },
            surfaceMuted: { value: "#eee8df" },
            ink: { value: "#1f2320" },
            mutedInk: { value: "#626a64" },
            line: { value: "#d8d0c4" },
            breath: { value: "#2f756c" },
            breathStrong: { value: "#225b54" },
            danger: { value: "#b3261e" },
            dangerBg: { value: "#fff0ee" }
          }
        },
        semanticTokens: {
          colors: {
            bg: { value: "{colors.cream}" },
            "bg.panel": { value: "{colors.surface}" },
            "bg.muted": { value: "{colors.surfaceMuted}" },
            fg: { value: "{colors.ink}" },
            "fg.muted": { value: "{colors.mutedInk}" },
            border: { value: "{colors.line}" },
            accent: { value: "{colors.breath}" },
            "accent.strong": { value: "{colors.breathStrong}" },
            "fg.error": { value: "{colors.danger}" },
            "bg.error": { value: "{colors.dangerBg}" }
          }
        },
        textStyles: {
          title: {
            value: {
              fontSize: "20px",
              fontWeight: "800",
              lineHeight: "1.2",
              letterSpacing: "0"
            }
          },
          label: {
            value: {
              fontSize: "13px",
              fontWeight: "700",
              lineHeight: "1.2",
              letterSpacing: "0"
            }
          }
        },
        recipes: {
          button: {
            base: {
              borderRadius: "999px",
              fontWeight: "800",
              minH: "44px"
            }
          }
        }
      }
    }));

    const STORAGE_KEYS = {
      voice: "breathwork.voice",
      muted: "breathwork.muted",
      haptics: "breathwork.haptics"
    };

    const PHASES = [
      { key: "inhale", label: "Inhale", short: "In" },
      { key: "hold", label: "Hold", short: "Hold" },
      { key: "exhale", label: "Exhale", short: "Out" },
      { key: "hold", label: "Hold", short: "Hold" }
    ];

    const NUMBER_WORDS = [
      "zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine",
      "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen",
      "seventeen", "eighteen", "nineteen", "twenty", "twenty-one", "twenty-two",
      "twenty-three", "twenty-four", "twenty-five", "twenty-six", "twenty-seven",
      "twenty-eight", "twenty-nine", "thirty"
    ];

    const CLIPS = {
      inhale: "inhale.mp3",
      hold: "hold.mp3",
      exhale: "exhale.mp3",
      ...Object.fromEntries(NUMBER_WORDS.slice(1).map((name, index) => [String(index + 1), `${name}.mp3`]))
    };

    const PRESETS = [
      {
        name: "Box breathing",
        description: "Build steady focus with equal inhale, hold, exhale, and hold.",
        times: [4, 4, 4, 4]
      },
      {
        name: "4-7-8",
        description: "Downshift toward rest with a long hold and longer exhale.",
        times: [4, 7, 8, 0]
      },
      {
        name: "Coherent breathing",
        description: "Support calm regulation with a smooth five-second rhythm.",
        times: [5, 0, 5, 0]
      },
      {
        name: "Relaxing breath",
        description: "Release tension with a soft inhale and extended exhale.",
        times: [4, 0, 6, 0]
      },
      {
        name: "Triangle breathing",
        description: "Create a clear three-part rhythm without a final hold.",
        times: [4, 4, 4, 0]
      },
      {
        name: "Energizing breath",
        description: "Use a shorter, active rhythm for alertness and momentum.",
        times: [3, 0, 3, 0]
      }
    ];

    const VOICES = {
      velvet: {
        name: "Velvet Guide",
        tone: "deep calm, grounding",
        feel: "like being wrapped in a soft blanket at dusk",
        best: "sleep, anxiety relief, long exhale work, theta states"
      },
      heart: {
        name: "Heart Companion",
        tone: "warm, human, gently uplifting",
        feel: "someone kind sitting next to you, breathing with you",
        best: "daily practice, emotional regulation, consistency"
      },
      light: {
        name: "Light Energizer",
        tone: "bright, alive, subtle joy",
        feel: "morning sunlight through a window",
        best: "energizing breathwork, Wim Hof style, activation"
      }
    };

    const clampTiming = value => {
      const number = Number.parseInt(String(value), 10);
      if (!Number.isFinite(number)) return 0;
      return Math.max(0, Math.min(30, number));
    };

    const patternText = times => times.join("-");

    const firstPlayablePhase = times => {
      const index = times.findIndex(seconds => seconds > 0);
      return index >= 0 ? index : 0;
    };

    const nextPlayablePhase = (times, currentPhase) => {
      for (let offset = 1; offset <= PHASES.length; offset += 1) {
        const nextPhase = (currentPhase + offset) % PHASES.length;
        if (times[nextPhase] > 0) {
          return {
            phaseIndex: nextPhase,
            completedCycle: nextPhase <= currentPhase
          };
        }
      }

      return {
        phaseIndex: firstPlayablePhase(times),
        completedCycle: true
      };
    };

    const cueForDisplayedSecond = (times, phaseIndex, remaining) => {
      if (remaining < 1) return null;
      if (remaining === times[phaseIndex]) return PHASES[phaseIndex].key;
      return String(remaining);
    };

    const formatDuration = seconds => {
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;
    };

    function App() {
      const [pattern, setPattern] = useState(PRESETS[0]);
      const [selectedVoice, setSelectedVoice] = useState(() => localStorage.getItem(STORAGE_KEYS.voice) || "velvet");
      const [muted, setMuted] = useState(() => localStorage.getItem(STORAGE_KEYS.muted) === "true");
      const [hapticsEnabled, setHapticsEnabled] = useState(() => localStorage.getItem(STORAGE_KEYS.haptics) !== "false");
      const [activePanel, setActivePanel] = useState(null);
      const [customOpen, setCustomOpen] = useState(false);
      const [customTimes, setCustomTimes] = useState([4, 4, 4, 0]);
      const [customErrors, setCustomErrors] = useState({ inhale: false, exhale: false });
      const [running, setRunning] = useState(false);
      const [phaseIndex, setPhaseIndex] = useState(firstPlayablePhase(PRESETS[0].times));
      const [remaining, setRemaining] = useState(PRESETS[0].times[firstPlayablePhase(PRESETS[0].times)]);
      const [duration, setDuration] = useState(0);
      const [completedBreaths, setCompletedBreaths] = useState(0);

      const audioRef = useRef({});
      const lastCueRef = useRef("");
      const phaseIndexRef = useRef(firstPlayablePhase(PRESETS[0].times));
      const tickRef = useRef(null);
      const sessionIdRef = useRef(0);

      const selectedPatternText = useMemo(() => patternText(pattern.times), [pattern]);

      const closePanels = useCallback(() => setActivePanel(null), []);

      const vibrate = useCallback(durationMs => {
        if (!hapticsEnabled || !navigator.vibrate) return;
        navigator.vibrate(durationMs);
      }, [hapticsEnabled]);

      const playCue = useCallback(cue => {
        if (muted) return false;
        const audio = audioRef.current[String(cue).toLowerCase()];
        if (!audio) return false;

        try {
          audio.pause();
          audio.currentTime = 0;
          audio.play().catch(() => {});
          return true;
        } catch (_) {
          return false;
        }
      }, [muted]);

      const resetSession = useCallback((nextPattern = pattern) => {
        const startPhase = firstPlayablePhase(nextPattern.times);
        window.clearInterval(tickRef.current);
        tickRef.current = null;
        sessionIdRef.current += 1;
        lastCueRef.current = "";
        Object.values(audioRef.current).forEach(audio => {
          audio.pause();
          audio.currentTime = 0;
        });
        setRunning(false);
        setPhaseIndex(startPhase);
        phaseIndexRef.current = startPhase;
        setRemaining(nextPattern.times[startPhase]);
        setDuration(0);
        setCompletedBreaths(0);
      }, [pattern]);

      const applyPattern = useCallback(nextPattern => {
        setPattern(nextPattern);
        setCustomTimes(nextPattern.times);
        setCustomErrors({ inhale: false, exhale: false });
        resetSession(nextPattern);
        closePanels();
      }, [closePanels, resetSession]);

      const startSession = () => {
        const startPhase = firstPlayablePhase(pattern.times);
        const startRemaining = pattern.times[startPhase];
        const nextSessionId = sessionIdRef.current + 1;
        setActivePanel(null);
        setCustomOpen(false);
        setDuration(0);
        setCompletedBreaths(0);
        setPhaseIndex(startPhase);
        phaseIndexRef.current = startPhase;
        setRemaining(startRemaining);
        setRunning(true);
        sessionIdRef.current = nextSessionId;
        lastCueRef.current = "";

        const firstCue = cueForDisplayedSecond(pattern.times, startPhase, startRemaining);
        if (firstCue) {
          const cueKey = `${nextSessionId}:${startPhase}:${startRemaining}:${firstCue}`;
          if (playCue(firstCue)) lastCueRef.current = cueKey;
        }
        vibrate(160);
      };

      const stopSession = () => {
        resetSession();
      };

      const updateCustomTime = (index, value) => {
        setCustomTimes(current => current.map((seconds, currentIndex) => currentIndex === index ? clampTiming(value) : seconds));
        if (index === 0) setCustomErrors(current => ({ ...current, inhale: false }));
        if (index === 2) setCustomErrors(current => ({ ...current, exhale: false }));
      };

      const stepCustomTime = (index, delta) => {
        setCustomTimes(current => current.map((seconds, currentIndex) => currentIndex === index ? clampTiming(seconds + delta) : seconds));
        if (index === 0) setCustomErrors(current => ({ ...current, inhale: false }));
        if (index === 2) setCustomErrors(current => ({ ...current, exhale: false }));
      };

      const applyCustomPattern = () => {
        const nextTimes = customTimes.map(clampTiming);
        const nextErrors = {
          inhale: nextTimes[0] < 1,
          exhale: nextTimes[2] < 1
        };
        setCustomErrors(nextErrors);
        if (nextErrors.inhale || nextErrors.exhale) return;

        applyPattern({
          name: "Custom breathing pattern",
          description: "Your custom rhythm.",
          times: nextTimes
        });
      };

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.voice, selectedVoice);
        const loaded = {};

        Object.entries(CLIPS).forEach(([key, file]) => {
          const audio = new Audio(`./audio/${selectedVoice}/${file}`);
          audio.preload = "auto";
          audio.load();
          loaded[key] = audio;
        });

        audioRef.current = loaded;

        return () => {
          Object.values(loaded).forEach(audio => {
            audio.pause();
            audio.removeAttribute("src");
            audio.load();
          });
        };
      }, [selectedVoice]);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.muted, String(muted));
      }, [muted]);

      useEffect(() => {
        localStorage.setItem(STORAGE_KEYS.haptics, String(hapticsEnabled));
      }, [hapticsEnabled]);

      useEffect(() => {
        if (!running) {
          window.clearInterval(tickRef.current);
          tickRef.current = null;
          return undefined;
        }

        tickRef.current = window.setInterval(() => {
          setDuration(seconds => seconds + 1);
          setRemaining(seconds => {
            if (seconds > 1) return seconds - 1;

            const next = nextPlayablePhase(pattern.times, phaseIndexRef.current);
            phaseIndexRef.current = next.phaseIndex;
            setPhaseIndex(next.phaseIndex);
            if (next.completedCycle) {
              setCompletedBreaths(count => count + 1);
            }
            return pattern.times[next.phaseIndex];
          });
        }, 1000);

        return () => {
          window.clearInterval(tickRef.current);
          tickRef.current = null;
        };
      }, [pattern.times, running]);

      useEffect(() => {
        if (!running || remaining < 1) return;

        const cue = cueForDisplayedSecond(pattern.times, phaseIndex, remaining);
        const cueKey = `${sessionIdRef.current}:${phaseIndex}:${remaining}:${cue}`;
        if (cue && lastCueRef.current !== cueKey) {
          if (playCue(cue)) lastCueRef.current = cueKey;
          vibrate(remaining === pattern.times[phaseIndex] ? 180 : 45);
        }
      }, [phaseIndex, pattern.times, playCue, remaining, running, vibrate]);

      return React.createElement(Box, {
        bg: "bg",
        color: "fg",
        minH: "100dvh",
        overflow: running ? "hidden" : "auto"
      },
        React.createElement(Box, {
          className: "app-safe",
          display: "flex",
          flexDirection: "column",
          h: running ? "100dvh" : "auto",
          maxW: "900px",
          minH: "100dvh",
          mx: "auto",
          pb: running ? "0" : "8",
          pt: "max(12px, env(safe-area-inset-top))"
        },
          React.createElement(Header, {
            hapticsEnabled,
            muted,
            onMenu: () => setActivePanel("menu"),
            onToggleHaptics: () => setHapticsEnabled(current => !current),
            onToggleMute: () => setMuted(current => !current),
            running
          }),
          React.createElement(BreathingCoach, {
            completedBreaths,
            duration,
            onStart: startSession,
            onStop: stopSession,
            pattern,
            patternText: selectedPatternText,
            phaseIndex,
            remaining,
            running
          }),
          !running && React.createElement(Stack, {
            align: "stretch",
            gap: "3",
            mt: "4",
            pb: "max(24px, env(safe-area-inset-bottom))"
          },
            React.createElement(Button, {
              className: "focus-ring",
              bg: "accent",
              color: "white",
              h: "52px",
              onClick: () => setActivePanel("patterns"),
              _hover: { bg: "accent.strong" }
            }, "Breathing pattern library"),
            React.createElement(CustomPattern, {
              customErrors,
              customOpen,
              customTimes,
              onApply: applyCustomPattern,
              onStep: stepCustomTime,
              onToggle: () => setCustomOpen(current => !current),
              onUpdate: updateCustomTime
            })
          )
        ),
        React.createElement(FullscreenPanel, {
          isOpen: activePanel === "menu",
          onClose: closePanels,
          title: "Menu"
        },
          React.createElement(Stack, { gap: "3" },
            React.createElement(MenuCard, {
              description: "Choose a predefined breathing pattern according to how you want to feel.",
              onClick: () => setActivePanel("patterns"),
              title: "Breathing patterns"
            }),
            React.createElement(MenuCard, {
              description: "Select a voice for the spoken guidance.",
              onClick: () => setActivePanel("voices"),
              title: "Choose a voice"
            })
          )
        ),
        React.createElement(FullscreenPanel, {
          isOpen: activePanel === "patterns",
          onClose: closePanels,
          title: "Breathing patterns"
        },
          React.createElement(Stack, { gap: "3" },
            PRESETS.map(preset => React.createElement(ChoiceCard, {
              key: preset.name,
              description: preset.description,
              meta: patternText(preset.times),
              onClick: () => applyPattern(preset),
              selected: preset.name === pattern.name && patternText(preset.times) === selectedPatternText,
              title: preset.name
            }))
          )
        ),
        React.createElement(FullscreenPanel, {
          isOpen: activePanel === "voices",
          onClose: closePanels,
          title: "Choose a voice"
        },
          React.createElement(Stack, { gap: "3" },
            Object.entries(VOICES).map(([key, voice]) => React.createElement(ChoiceCard, {
              key,
              description: `Feel: ${voice.feel}`,
              meta: `Best for: ${voice.best}`,
              onClick: () => {
                setSelectedVoice(key);
                closePanels();
              },
              selected: selectedVoice === key,
              title: `${voice.name} (${voice.tone})`
            }))
          )
        )
      );
    }

    function Header({ hapticsEnabled, muted, onMenu, onToggleHaptics, onToggleMute, running }) {
      return React.createElement(Flex, {
        align: "center",
        as: "header",
        flex: "0 0 auto",
        justify: "space-between",
        pb: "3",
        pt: "1",
        zIndex: "10"
      },
        React.createElement(IconButton, {
          "aria-label": "Open menu",
          className: "focus-ring",
          onClick: onMenu,
          variant: "ghost"
        }, React.createElement(Menu, { size: 24, strokeWidth: 2.2 })),
        React.createElement(Text, {
          fontSize: running ? "16px" : "20px",
          fontWeight: "800",
          lineHeight: "1.1"
        }, "Breathwork"),
        React.createElement(HStack, { gap: "1" },
          React.createElement(IconButton, {
            "aria-label": muted ? "Unmute voice guidance" : "Mute voice guidance",
            className: "focus-ring",
            onClick: onToggleMute,
            variant: "ghost"
          }, muted ? React.createElement(VolumeX, { size: 22 }) : React.createElement(Volume2, { size: 22 })),
          React.createElement(IconButton, {
            "aria-label": hapticsEnabled ? "Disable haptic feedback" : "Enable haptic feedback",
            className: "focus-ring",
            onClick: onToggleHaptics,
            variant: "ghost"
          }, hapticsEnabled ? React.createElement(Zap, { size: 21 }) : React.createElement(ZapOff, { size: 21 }))
        )
      );
    }

    function BreathingCoach({ completedBreaths, duration, onStart, onStop, pattern, patternText, phaseIndex, remaining, running }) {
      if (running) {
        const phase = PHASES[phaseIndex];
        const phaseDuration = pattern.times[phaseIndex] || 1;
        const progress = 1 - ((remaining - 1) / Math.max(1, phaseDuration));
        const scale = phase.key === "inhale"
          ? 0.78 + progress * 0.22
          : phase.key === "exhale"
            ? 1 - progress * 0.22
            : 1;

        return React.createElement(Grid, {
          flex: "1 1 auto",
          gridTemplateRows: "72px minmax(0, 1fr) 96px",
          minH: "0",
          pb: "max(12px, env(safe-area-inset-bottom))"
        },
          React.createElement(Flex, {
            align: "center",
            borderBottom: "1px solid",
            borderColor: "border",
            justify: "space-between"
          },
            React.createElement(Stat, { label: "Duration", value: formatDuration(duration) }),
            React.createElement(Stat, { label: "Breaths", value: completedBreaths })
          ),
          React.createElement(Flex, {
            align: "center",
            direction: "column",
            justify: "center",
            minH: "0",
            py: "6",
            textAlign: "center"
          },
            React.createElement(Box, {
              className: "breath-orb",
              style: { "--breath-scale": String(scale) },
              alignItems: "center",
              bg: "bg.panel",
              border: "1px solid",
              borderColor: "border",
              borderRadius: "999px",
              boxShadow: "var(--app-shadow)",
              display: "flex",
              flexDirection: "column",
              h: { base: "min(62vw, 310px)", md: "340px" },
              justifyContent: "center",
              maxH: "48dvh",
              minH: "220px",
              minW: "220px",
              px: "8",
              w: { base: "min(62vw, 310px)", md: "340px" }
            },
              React.createElement(Text, {
                color: "accent",
                fontSize: "clamp(26px, 8vw, 52px)",
                fontWeight: "900",
                lineHeight: "1"
              }, phase.label),
              React.createElement(Text, {
                fontSize: "clamp(88px, 27vw, 176px)",
                fontWeight: "900",
                lineHeight: "0.9",
                mt: "3"
              }, remaining),
              React.createElement(Text, {
                color: "fg.muted",
                fontSize: "18px",
                fontWeight: "800",
                mt: "4"
              }, patternText)
            )
          ),
          React.createElement(Flex, {
            align: "end",
            justify: "center"
          },
            React.createElement(Button, {
              className: "focus-ring",
              bg: "bg.error",
              border: "1px solid",
              borderColor: "fg.error",
              color: "fg.error",
              h: "56px",
              maxW: "420px",
              onClick: onStop,
              w: "100%",
              _hover: { bg: "bg.error" }
            }, "Stop")
          )
        );
      }

      return React.createElement(Flex, {
        align: "center",
        bg: "bg.panel",
        border: "1px solid",
        borderColor: "border",
        borderRadius: "28px",
        boxShadow: "var(--app-shadow)",
        direction: "column",
        justify: "center",
        minH: { base: "430px", md: "520px" },
        px: { base: "6", md: "10" },
        py: "10",
        textAlign: "center"
      },
        React.createElement(Box, {
